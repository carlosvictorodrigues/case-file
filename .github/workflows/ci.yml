name: CI

on:
  push:
  pull_request:

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run build
      # O bundle distribui só as dependencies de runtime (canvas do pdfjs é
      # optionalDependency de renderização; só extraímos texto).
      - run: npm prune --omit=dev --omit=optional
      - run: npm run pack:mcpb
      - run: npm run verify:mcpb
